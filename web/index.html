  <script>
    function getWebLocation(onSuccess, onError) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            onSuccess(position.coords.latitude, position.coords.longitude);
          },
          function(error) {
            onError(error.message || "Konum alınamadı");
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      } else {
        onError("Tarayıcı geolocation desteklemiyor");
      }
    }
  </script>

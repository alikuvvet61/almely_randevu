name: almely_randevu
description: "Türkiye'nin Tek Nokta Randevu Portalı - AlmEly Super App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # İkonlar
  cupertino_icons: ^1.0.6

  # Konum Servisleri
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Harita ve HTTP (Gelecekteki API bağlantıları için)
  google_maps_flutter: ^2.5.3
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset tanımlamaları (Resimlerin görünmesi için burası şart)
  assets:
    - assets/AlmEly.png